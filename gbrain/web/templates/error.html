<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>错误 - GBrain 培训平台</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f5f7fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .error-container { text-align: center; background: white; padding: 3rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .error-code { font-size: 4rem; font-weight: bold; color: #e74c3c; }
        .error-message { font-size: 1.25rem; color: #666; margin: 1rem 0 2rem; }
        .btn { display: inline-block; padding: 0.75rem 1.5rem; background: #1a1a2e; color: white; text-decoration: none; border-radius: 6px; }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">500</div>
        <div class="error-message">服务器内部错误</div>
        <a href="/" class="btn">返回首页</a>
    </div>
</body>
</html>
