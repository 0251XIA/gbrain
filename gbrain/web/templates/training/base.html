<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ title }}{% endblock %} - GBrain 培训平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f7fa;
            color: #333;
            min-height: 100vh;
        }
        .navbar {
            background: #1a1a2e;
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar .logo { font-size: 1.25rem; font-weight: bold; }
        .navbar .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 1.5rem;
            opacity: 0.8;
        }
        .navbar .nav-links a:hover { opacity: 1; }
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
        .card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .btn {
            display: inline-block;
            padding: 0.5rem 1rem;
            background: #1a1a2e;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            border: none;
            cursor: pointer;
        }
        .btn:hover { opacity: 0.9; }
        .btn-primary { background: #4361ee; }
        .tag {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            background: #e0e7ff;
            color: #4361ee;
            border-radius: 4px;
            font-size: 0.75rem;
        }
        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-in-progress { background: #cce5ff; color: #004085; }
        .status-completed { background: #d4edda; color: #155724; }
        .status-failed { background: #f8d7da; color: #721c24; }
    </style>
    {% block extra_style %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="logo">GBrain 培训平台</div>
        <div class="nav-links">
            <a href="/training">首页</a>
            <a href="/training/tasks">任务列表</a>
            <a href="/training/dashboard">数据看板</a>
            <a href="/training/admin">管理后台</a>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer style="text-align: center; padding: 2rem; color: #666; font-size: 0.875rem;">
        GBrain 培训平台 v0.1.0
    </footer>
    {% block extra_script %}{% endblock %}
</body>
</html>
