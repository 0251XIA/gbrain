{% extends "training/base.html" %}

{% block title %}任务详情{% endblock %}

{% block extra_style %}
<style>
.outline-module {
    background: white;
    border: 1px solid #e0e0e0;
    border-radius: 12px;
    padding: 1.25rem;
    margin-bottom: 1rem;
}
.outline-module .module-title {
    font-size: 1rem;
    font-weight: 600;
    color: #333;
    margin-bottom: 0.75rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
}
.outline-module .module-title .num {
    background: #4361ee;
    color: white;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    flex-shrink: 0;
}
.outline-module .knowledge-points {
    color: #555;
    font-size: 0.875rem;
    margin-bottom: 0.5rem;
}
.outline-module .knowledge-points span {
    background: #f0f4ff;
    color: #4361ee;
    padding: 0.25rem 0.625rem;
    border-radius: 4px;
    margin-right: 0.5rem;
    margin-bottom: 0.375rem;
    display: inline-block;
}
.outline-module .summary {
    color: #666;
    font-size: 0.8rem;
    font-style: italic;
}
</style>
{% endblock %}

{% block content %}
<div id="task-detail">
    <p style="color: #999;">加载中...</p>
</div>
{% endblock %}

{% block extra_script %}
<script>
const taskId = "{{ task_id }}";

// 按优先级提取知识点
function extractKnowledgePoints(content) {
    const points = [];
    const seen = new Set();

    // P1: ### 三级标题
    const h3Pattern = /^###\s+(.+?)$/gm;
    let match;
    while ((match = h3Pattern.exec(content)) !== null) {
        let title = match[1].trim();
        title = title.replace(/^[\d\.、\s]+/, '');
        if (title && !seen.has(title)) {
            seen.add(title);
            points.push({ type: 'h3', text: title });
        }
    }

    // P2: 有序号的重要行（1. xxx 2. xxx）
    const lines = content.split('\n');
    for (const line of lines) {
        const trimmed = line.trim();
        if (/^\d+\./.test(trimmed)) {
            const items = trimmed.split(/(?=\d+\.)/);
            for (const item of items) {
                const cleaned = item.replace(/^\d+\.\s*/, '').trim().slice(0, 30);
                if (cleaned && !seen.has(cleaned)) {
                    seen.add(cleaned);
                    points.push({ type: 'num', text: cleaned });
                }
            }
        }
    }

    // P3: 加粗关键词 **xxx**
    const boldPattern = /\*\*(.+?)\*\*/g;
    while ((match = boldPattern.exec(content)) !== null) {
        const point = match[1].trim();
        if (point.length >= 2 && !seen.has(point)) {
            seen.add(point);
            points.push({ type: 'bold', text: point });
        }
    }

    return points;
}

// 提取模块概括（取模块下第一段话）
function extractModuleSummary(content) {
    if (!content) return '';
    const lines = content.split('\n');
    for (const line of lines) {
        const trimmed = line.trim();
        if (trimmed && !trimmed.startsWith('-') && !trimmed.startsWith('*') && !trimmed.startsWith('|') && !trimmed.startsWith('#')) {
            return trimmed.slice(0, 60) + (trimmed.length > 60 ? '...' : '');
        }
    }
    return '';
}

// 解析讲义结构：按 ## 分割模块，模块内提取知识点
function parseOutline(content) {
    if (!content) return [];
    const modules = [];
    const lines = content.split('\n');
    let currentModule = null;
    let currentContent = [];

    for (const line of lines) {
        const h2Match = line.match(/^(#{2})\s+(.+)/);
        if (h2Match) {
            if (currentModule) {
                // 提取当前模块的知识点（只用 P1 ### 和 P2 序号）
                const moduleContent = currentContent.join('\n');
                const h3Pattern = /^###\s+(.+?)$/gm;
                let m;
                while ((m = h3Pattern.exec(moduleContent)) !== null) {
                    let title = m[1].trim().replace(/^[\d\.、\s]+/, '');
                    if (title) currentModule.points.push(title);
                }
                // P2: 序号列表
                for (const cl of currentContent) {
                    const trimmed = cl.trim();
                    if (/^\d+\./.test(trimmed)) {
                        const items = trimmed.split(/(?=\d+\.)/);
                        for (const item of items) {
                            const cleaned = item.replace(/^\d+\.\s*/, '').trim().slice(0, 30);
                            if (cleaned && !currentModule.points.includes(cleaned)) {
                                currentModule.points.push(cleaned);
                            }
                        }
                    }
                }
                currentModule.summary = extractModuleSummary(currentContent.join('\n'));
                modules.push(currentModule);
            }
            const title = h2Match[2].trim();
            currentModule = { title, points: [], summary: '' };
            currentContent = [];
        } else if (currentModule) {
            currentContent.push(line);
        }
    }

    if (currentModule) {
        // 提取知识点
        const moduleContent = currentContent.join('\n');
        const h3Pattern = /^###\s+(.+?)$/gm;
        let m;
        while ((m = h3Pattern.exec(moduleContent)) !== null) {
            let title = m[1].trim().replace(/^[\d\.、\s]+/, '');
            if (title) currentModule.points.push(title);
        }
        for (const cl of currentContent) {
            const trimmed = cl.trim();
            if (/^\d+\./.test(trimmed)) {
                const items = trimmed.split(/(?=\d+\.)/);
                for (const item of items) {
                    const cleaned = item.replace(/^\d+\.\s*/, '').trim().slice(0, 30);
                    if (cleaned && !currentModule.points.includes(cleaned)) {
                        currentModule.points.push(cleaned);
                    }
                }
            }
        }
        currentModule.summary = extractModuleSummary(currentContent.join('\n'));
        modules.push(currentModule);
    }

    // 去重每个模块的知识点
    for (const mod of modules) {
        const seen = new Set();
        mod.points = mod.points.filter(p => {
            if (seen.has(p)) return false;
            seen.add(p);
            return true;
        });
    }

    return modules;
}

async function loadTask() {
    try {
        const res = await fetch(`/api/training/task/${taskId}`);
        const data = await res.json();
        const container = document.getElementById('task-detail');

        if (data.task) {
            const content = data.task.content || '';
            const modules = parseOutline(content);

            let modulesHtml = modules.map((mod, i) => {
                const pointsHtml = mod.points.slice(0, 6).map(p =>
                    `<span>${p}</span>`
                ).join('');
                return `
                    <div class="outline-module">
                        <div class="module-title">
                            <span class="num">${i + 1}</span>
                            ${mod.title}
                        </div>
                        ${pointsHtml ? `<div class="knowledge-points">${pointsHtml}</div>` : ''}
                        ${mod.summary ? `<div class="summary">💡 ${mod.summary}</div>` : ''}
                    </div>
                `;
            }).join('');

            if (!modulesHtml) {
                modulesHtml = '<p style="color: #999;">暂无课程大纲</p>';
            }

            const typeLabel = data.task.task_type === 'onboarding' ? '入职培训' : '技能提升';
            const deadlineText = data.task.deadline ? `截止日期：${data.task.deadline.split('T')[0]}` : '未设置截止日期';

            container.innerHTML = `
                <div style="max-width: 800px; margin: 0 auto;">
                    <div class="card" style="margin-bottom: 1.5rem;">
                        <h1 style="font-size: 1.5rem; margin-bottom: 0.75rem;">${data.task.title}</h1>
                        <div style="display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center;">
                            <span class="tag">${typeLabel}</span>
                            <span style="color: #999; font-size: 0.875rem;">${deadlineText}</span>
                        </div>
                    </div>

                    <div style="margin-bottom: 1.5rem;">
                        <h2 style="font-size: 1.1rem; color: #333; margin-bottom: 1rem;">
                            📋 课程大纲 ${modules.length > 0 ? `（共 ${modules.length} 个模块）` : ''}
                        </h2>
                        <div>${modulesHtml}</div>
                    </div>

                    <div style="text-align: center; margin-top: 2rem;">
                        <a href="/training/task/${taskId}/learn" class="btn btn-primary" style="padding: 0.75rem 2rem; font-size: 1rem;">
                            开始学习 →
                        </a>
                    </div>
                </div>
            `;
        } else {
            container.innerHTML = '<p style="color: #999;">任务不存在</p>';
        }
    } catch (e) {
        document.getElementById('task-detail').innerHTML = '<p style="color: #999;">加载失败</p>';
    }
}

loadTask();
</script>
{% endblock %}
